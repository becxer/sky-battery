<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sky Battery</title>
    <link rel="stylesheet" href="style.css?v=20260620-cruise-no-steer" />
  </head>
  <body>
    <div id="loginOverlay" class="login-overlay">
      <form id="loginForm" class="login-box">
        <h1>Sky Battery</h1>
        <label>
          Name
          <input id="nameInput" type="text" maxlength="16" autocomplete="nickname" required />
        </label>
        <label id="loginTankChoice" class="tank-select-row" hidden>
          Tank
          <select id="tankTypeSelect">
            <option value="">Random</option>
            <option value="normal">Normal</option>
            <option value="multi">Triple Missile</option>
            <option value="red">Red Core</option>
            <option value="missile">Seeker</option>
            <option value="artillery">Howitzer</option>
            <option value="laser">Laser</option>
            <option value="chain">3-Cushion Chain</option>
            <option value="poop">Poop</option>
            <option value="nuke">Nuke</option>
            <option value="cruise">Cruise Missile</option>
            <option value="cheese">Cheese Splitter</option>
            <option value="zombie">Zombie Stone</option>
            <option value="healing">Healing</option>
            <option value="heart">Heart</option>
            <option value="butt">Pujik</option>
            <option value="boing">Boing</option>
            <option value="superball">Ball</option>
            <option value="super">Super</option>
          </select>
        </label>
        <p id="loginError" class="login-error" role="alert"></p>
        <button type="submit">Join Game</button>
      </form>
    </div>

    <main class="shell">
      <div class="game-stage">
        <canvas id="game" width="1200" height="540" aria-label="Three player artillery game"></canvas>

        <button id="resetButton" class="reset-overlay" type="button">Reset</button>

        <section class="controls" aria-label="Shot controls">
          <div class="move-controls" aria-label="Move controls">
            <button id="moveLeftButton" class="move-button move-left" type="button" aria-label="Move left">
              <span aria-hidden="true"></span>
            </button>
            <button id="moveRightButton" class="move-button move-right" type="button" aria-label="Move right">
              <span aria-hidden="true"></span>
            </button>
          </div>
          <div class="move-meter" aria-label="Move remaining">
            <span>Move</span>
            <strong id="moveValue">0</strong>
          </div>
          <input id="angle" class="hidden-control" type="range" min="5" max="85" value="45" aria-label="Angle" />
          <input id="power" class="hidden-control" type="range" min="20" max="100" value="60" aria-label="Power" />
          <div class="power-panel">
            <div class="control-readouts">
              <span>Angle <strong id="angleValue">45</strong></span>
              <span>Power <strong id="powerValue">60</strong></span>
            </div>
            <div class="power-charge" aria-label="Power charge">
              <div id="previousPowerBar" class="power-previous"></div>
              <div id="chargePowerBar" class="power-current"></div>
            </div>
          </div>
          <div id="aimFireControl" class="aim-fire-control">
            <div id="aimDial" class="aim-dial" role="slider" aria-label="Angle dial" aria-valuemin="5" aria-valuemax="85" aria-valuenow="45">
              <svg id="aimGuide" class="aim-guide" viewBox="0 0 100 100" aria-hidden="true">
                <path id="aimRangePath" class="aim-range-path" d="" />
                <path id="aimRangeLine" class="aim-range-line" d="" />
              </svg>
              <div id="angleIndicator" class="angle-indicator" aria-hidden="true"></div>
            </div>
            <button id="fireButton" type="button">Fire</button>
          </div>
        </section>
      </div>

      <p id="tankDescription" class="hint">Three phones can join on the same Wi-Fi. Movement is limited each turn.</p>
    </main>

    <script src="game.js?v=20260620-cruise-no-steer"></script>
  </body>
</html>
